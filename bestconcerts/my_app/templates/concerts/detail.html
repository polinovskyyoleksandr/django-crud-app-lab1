{% extends 'base.html' %} 
{% load static %} 
{% block head %}
<link rel="stylesheet" href="{% static 'css/concert/concert-detail.css' %}" />
{% endblock %} 
{% block content %}
<section class="cat-container">
  <div class="cat-img">
    <img src="{% static 'images/sk8r-boi-cat.svg' %}" alt="A skater boy cat" />
  </div>
  <div class="cat-details">
      <h2 class="card-title">{{ concert.artist }}</h2>
      <p>{{ concert.genre }} - {{ concert.year }}</p>
      <p><small>{{ concert.description }}</small></p>
      <div class="concert-actions">
    <a href="{% url 'concert-update' concert.id %}" class="btn warn">Edit</a>
    <a href="{% url 'concert-delete' concert.id %}" class="btn danger">Delete</a>
  </div>
  </div>
</section>
{% endblock %}
